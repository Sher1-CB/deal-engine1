<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Deal Engine v2.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2f; color: #e0e0e0; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #2a2a40; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #4facfe; border-bottom: 2px solid #4facfe; padding-bottom: 10px; }
        .step-box { background: #32324e; padding: 20px; margin-top: 20px; border-radius: 8px; border-left: 5px solid #4facfe; }
        h3 { margin-top: 0; color: #00f2fe; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 14px; color: #a5d6ff;}
        textarea, input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #555; background: #1e1e2f; color: #fff; font-family: inherit; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { background: linear-gradient(to right, #4facfe, #00f2fe); color: white; border: none; padding: 12px 20px; margin-top: 15px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }
        .output-box { background: #1e1e2f; border: 1px solid #4facfe; padding: 15px; border-radius: 5px; min-height: 80px; white-space: pre-wrap; font-family: monospace; color: #fff; margin-top: 10px;}
        .api-box { background: #3a2a2a; border-left: 5px solid #ff4b2b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hybrid Deal Engine v2.0</h1>

    <div class="step-box api-box">
        <h3>⚙️ System Setup</h3>
        <label>Google Gemini API Key:</label>
        <input type="password" id="apiKey" placeholder="Paste your AIzaSy... key here">
    </div>

    <div class="step-box">
        <h3>Step 1: Deal Details</h3>
        <label>Raw Deal Text:</label>
        <textarea id="rawText" placeholder="Paste the raw deal text here..."></textarea>
        
        <div class="row">
            <div class="col">
                <label>Current Day:</label>
                <select id="currentDay">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>
            <div class="col">
                <label>Deal Number (1-7):</label>
                <input type="number" id="dealNumber" min="1" max="7" value="1">
            </div>
        </div>
        <button id="apiButton" onclick="processDeal()">✨ Generate & Assemble Post</button>
    </div>

    <div class="step-box">
        <h3>Step 2: Final Output</h3>
        <div id="finalOutput" class="output-box">Your final Facebook posts will appear here...</div>
        <button onclick="copyToClipboard('finalOutput')">📋 Copy Final Posts to Clipboard</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
    });

    // --- DICTIONARIES (The JavaScript Brain) ---
    const banks = {
        A: { theme: ["🧘","🛀","🛌","🧖","💆","🍵","☕"], prefixes: ["Just", "Down to", "At", "Score it for"], compLabels: ["Regular", "Normally", "Originally", "Previously"], pointers: ["I put it right under here for you!", "You can grab yours right under here!", "I left the exact page right under this!"] },
        B: { theme: ["🌲","🍃","🍂","🌱","🌿","🌻","🌼"], prefixes: ["Only", "Found for", "Marked at", "Sitting at"], compLabels: ["Normally", "Was", "Regular", "List"], pointers: ["It's waiting for you right down there!", "Just scroll down a tiny bit to find it!", "The right spot is waiting just a step down!"] },
        C: { theme: ["📿","👒","💍","👜","🕶️","💄","👠"], prefixes: ["Now", "Fell to", "Yours for", "Spotted at"], compLabels: ["Originally", "Previously", "Was", "Regular"], pointers: ["Find the exact location ready for you in the next section!", "Everything you need is a little further down!", "Catch it just a quick scroll away!"] },
        D: { theme: ["🎨","🖌️","🖍️","🧵","🧶","🖼️","🎭"], prefixes: ["", "Grab it for", "Snag it for", "Down to"], compLabels: ["Was", "List", "Normally", "Originally"], pointers: ["I pinned the exact spot right under this text!", "The location is resting just under this text!", "Look just a little further down for the page!"] },
        E: { theme: ["🛋️","🪑","🕰️","🚪","🛏️","🧱","🏺"], prefixes: ["Spotted at", "Just", "Marked at", "Down to"], compLabels: ["Previously", "Regular", "List", "Was"], pointers: ["I tucked the exact spot right under here!", "You can find it right under here!", "I left the location right under this!"] },
        F: { theme: ["🏕️","⛺","🪵","🔥"," compass","🗺️","🛶"], prefixes: ["Score it for", "At", "Found for", "Only"], compLabels: ["List", "Originally", "Normally", "Regular"], pointers: ["It's resting for you right down there!", "Just scroll down a bit to see it!", "The exact page is waiting just a step down!"] },
        G: { theme: ["📱","💻","⌨️","🖱️","🖨️","🎧","🔋"], prefixes: ["Fell to", "Yours for", "Grab it for", "Sitting at"], compLabels: ["Regular", "Was", "Previously", "Normally"], pointers: ["Find the exact spot ready for you in the next section!", "Everything you want is a little further down!", "Catch the location just a quick scroll away!"] }
    };

    const statuses = ["Shipped!", "To your door!", "Delivery included!", "On its way!"];
    const discoveries = ["We just spotted this crazy good find", "This plummeted and we had to show you", "Our team thinks this is an unreal discovery today"];
    const linkLeads = ["Grab it here:", "See it here:", "Find it here:"];
    const dtEmojis = ["🌤️", "🍃", "🌊"];
    const faces = ["😀", "😃", "😊", "😎", "🤩"];

    function getRoutingBank(day, dealNum) {
        const matrix = {
            "Sunday": ["A","B","C","D","E","F","G"], "Monday": ["B","C","D","E","F","G","A"],
            "Tuesday": ["C","D","E","F","G","A","B"], "Wednesday": ["D","E","F","G","A","B","C"],
            "Thursday": ["E","F","G","A","B","C","D"], "Friday": ["F","G","A","B","C","D","E"],
            "Saturday": ["G","A","B","C","D","E","F"]
        };
        return matrix[day][dealNum - 1];
    }

    // --- API CALL & ASSEMBLY ---
    async function processDeal() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const rawText = document.getElementById('rawText').value.trim();
        const day = document.getElementById('currentDay').value;
        const dealNum = parseInt(document.getElementById('dealNumber').value);
        const btn = document.getElementById('apiButton');

        if(!apiKey || !rawText) { alert("Please provide API Key and Raw Text!"); return; }
        localStorage.setItem('geminiApiKey', apiKey);

        btn.innerText = "⏳ AI is writing & assembling... Please wait...";
        btn.disabled = true;
        document.getElementById('finalOutput').innerText = "Processing...";

        // The Micro-Prompt (Forces AI to return strict JSON)
        const prompt = `Analyze this deal: "${rawText}"
        Return ONLY a valid JSON object with these exact keys:
        "cleaned_title": (String. Remove banned words. Keep QTY/sizes intact),
        "sale_price": (String. e.g. "$19.99"),
        "reg_price": (String. Strip decimals, e.g. "34 99". If none, write "NONE"),
        "praises": (Array of 3 short hype questions),
        "inferences": (Array of 3 short lifestyle statements),
        "disclaimers": (Array of 3 casual warnings like 'Hope it stays this low!'),
        "b2_strategies": (Array of 4 sentences about limits/colors/qty. If none, write ["DEAD","DEAD","DEAD","DEAD"]),
        "b8_info": (Array of 4 sentences about S&S or extra features. If none, write ["DEAD","DEAD","DEAD","DEAD"]),
        "dt_signoff": (String. 1 short lifestyle sentence),
        "comp_emojis": (Array of 5 emojis that complement the product, e.g. food for pans),
        "product_emoji": (String. 1 literal emoji for the product)
        Do NOT use banned words: Price, Cost, Sale, Deal, Save, Discount, Buy, Shop, Coupon, Checkout, Promo, Free, Link, Cart.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.2, responseMimeType: "application/json" } 
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);

            const aiData = JSON.parse(data.candidates[0].content.parts[0].text);
            
            // --- JAVASCRIPT ASSEMBLY ENGINE ---
            const isOdd = dealNum % 2 !== 0;
            const bank = banks[getRoutingBank(day, dealNum)];
            
            // Build Super-Lines
            let sl = [];
            for(let i=0; i<3; i++) {
                let hook = `${bank.prefixes[i]} ${aiData.sale_price} ${statuses[i]}`;
                if(aiData.reg_price !== "NONE") hook += ` (${bank.compLabels[i]} ${aiData.reg_price})`;
                sl.push(isOdd ? `${hook} -- ${aiData.cleaned_title}` : `${aiData.cleaned_title} -- ${hook}`);
            }

            // Build Posts (Space Chaos Hardcoded via \n)
            let posts = "";
            for(let i=0; i<3; i++) {
                let b2 = aiData.b2_strategies[i] !== "DEAD" ? `${aiData.b2_strategies[i]} ` : "";
                let b8 = aiData.b8_info[i] !== "DEAD" ? `${aiData.b8_info[i]} ` : "";
                
                let l1, l2, l3, l4, l5;
                
                // Standard Shuffle (1,4,7)
                if(dealNum === 1 || dealNum === 4 || dealNum === 7) {
                    l1 = `${discoveries[i]} on Amazon! ${bank.theme[i]}`;
                    l2 = `${sl[i]} ${bank.theme[i+3]}`;
                    l3 = `${b2}${bank.pointers[i]} ${aiData.comp_emojis[i]}`;
                    l4 = `${aiData.inferences[i]} ${aiData.comp_emojis[i+1] || aiData.comp_emojis[0]}`;
                    l5 = b8 ? `${b8}${faces[i]}` : "";
                } 
                // Inference Lead (2,5)
                else if (dealNum === 2 || dealNum === 5) {
                    l1 = `${aiData.inferences[i]} ${bank.theme[i]}`;
                    l2 = `${sl[i]} ${bank.theme[i+3]}`;
                    l3 = `${discoveries[i]} on Amazon! ${aiData.comp_emojis[i]}`;
                    l4 = `${bank.pointers[i]} ${b2}${aiData.comp_emojis[i+1] || aiData.comp_emojis[0]}`;
                    l5 = b8 ? `${b8}${faces[i]}` : "";
                }
                // Discovery Lead (3,6)
                else {
                    l1 = `${discoveries[i]} on Amazon! ${bank.theme[i]}`;
                    l2 = `${aiData.inferences[i]} ${bank.theme[i+3]}`;
                    l3 = `${sl[i]} ${aiData.comp_emojis[i]}`;
                    l4 = `${b2}${bank.pointers[i]} ${aiData.comp_emojis[i+1] || aiData.comp_emojis[0]}`;
                    l5 = b8 ? `${b8}${faces[i]}` : "";
                }

                // Apply Space Chaos
                let postText = "";
                if(i === 0) postText = `${l1}\n\n${l2}\n${l3}\n\n${l4}` + (l5 ? `\n\n${l5}` : "");
                if(i === 1) postText = `${l1}\n\n${l2}\n\n${l3}\n${l4}` + (l5 ? `\n\n${l5}` : "");
                if(i === 2) postText = `${l1}\n\n${l2}\n\n${l3}\n\n${l4}` + (l5 ? `\n${l5}` : "");

                posts += `=== POST VARIATION ${i+1} ===\n${postText}\n\n`;
            }

            // Build Comments
            let comments = "";
            for(let i=0; i<3; i++) {
                let cText = "";
                let url = "https://your-link-here.com"; // Placeholder for actual URL extraction if needed
                
                if(isOdd) {
                    if(i===0) cText = `${aiData.praises[i]} ${faces[i]} ${linkLeads[i]} ${url} ${aiData.disclaimers[i]}`;
                    if(i===1) cText = `${aiData.praises[i]} ${faces[i]}\n\n${linkLeads[i]} ${url}\n\n${aiData.disclaimers[i]}`;
                    if(i===2) cText = `${aiData.praises[i]} ${aiData.product_emoji} ${linkLeads[i]} ${url}\n\n${aiData.disclaimers[i]}`;
                } else {
                    if(i===0) cText = `${aiData.praises[i]} ${faces[i]}\n\n${linkLeads[i]} ${url}\n\n${aiData.disclaimers[i]}`;
                    if(i===1) cText = `${linkLeads[i]} ${url}\n\n${aiData.disclaimers[i]} ${aiData.praises[i]} ${faces[i]}`;
                    if(i===2) cText = `${linkLeads[i]} ${url} ${aiData.disclaimers[i]} ${aiData.praises[i]} ${aiData.product_emoji}`;
                }
                comments += `=== COMMENT ${i+1} ===\n${cText}\n\n`;
            }

            // Build Daily Thread
            let dtHeader = isOdd ? `${bank.prefixes[3]} ${aiData.sale_price} ${statuses[3]} on Amazon -- ${aiData.cleaned_title}` : `${aiData.cleaned_title} -- ${bank.prefixes[3]} ${aiData.sale_price} ${statuses[3]} on Amazon`;
            if(aiData.reg_price !== "NONE") dtHeader += ` (${bank.compLabels[3]} ${aiData.reg_price})`;
            
            let dtB2 = aiData.b2_strategies[3] !== "DEAD" ? `${aiData.b2_strategies[3]} ${dtEmojis[0]}` : "";
            let dtB8 = aiData.b8_info[3] !== "DEAD" ? `${aiData.b8_info[3]} ${dtEmojis[1]}` : "";

            let dtText = `${dtHeader}\n\nCheck it out right here: https://your-link-here.com\n\n${aiData.dt_signoff} ${dtEmojis[2]}`;
            if(dtB2) dtText += `\n\n${dtB2}`;
            if(dtB8) dtText += `\n\n${dtB8}`;

            let finalOutput = `${posts}${comments}=== DAILY THREAD COMMENT ===\n${dtText}`;
            
            document.getElementById('finalOutput').innerText = finalOutput;

        } catch (error) {
            alert("Error: " + error.message);
            document.getElementById('finalOutput').innerText = "Error generating deal. Please check your API key and try again.";
        } finally {
            btn.innerText = "✨ Generate & Assemble Post";
            btn.disabled = false;
        }
    }

    function copyToClipboard(elementId) {
        const textToCopy = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert("Copied to clipboard! Spacing is perfectly preserved.");
        }).catch(err => {
            alert("Failed to copy text: " + err);
        });
    }
</script>

</body>
</html>
